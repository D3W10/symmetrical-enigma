name: Sync from upstream only when child is unchanged

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

env:
  UPSTREAM_REPO: your-org/your-upstream-repo
  UPSTREAM_BRANCH: main
  BASE_BRANCH: main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout child repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote remove upstream || true
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch --no-tags upstream "${UPSTREAM_BRANCH}"
          git fetch --no-tags origin "${BASE_BRANCH}"

      - name: Decide whether to sync
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          COUNTS=$(git rev-list --left-right --count "upstream/${UPSTREAM_BRANCH}...${BASE_BRANCH}")
          UPSTREAM_ONLY=$(echo "$COUNTS" | awk '{print $1}')
          CHILD_ONLY=$(echo "$COUNTS" | awk '{print $2}')

          echo "upstream_only=$UPSTREAM_ONLY" >> "$GITHUB_OUTPUT"
          echo "child_only=$CHILD_ONLY" >> "$GITHUB_OUTPUT"

          if [ "$UPSTREAM_ONLY" -eq 0 ]; then
            echo "mode=none" >> "$GITHUB_OUTPUT"
          elif [ "$CHILD_ONLY" -eq 0 ]; then
            echo "mode=fast-forward" >> "$GITHUB_OUTPUT"
          else
            echo "mode=skip-customized" >> "$GITHUB_OUTPUT"
          fi

      - name: Fast-forward main from upstream
        if: steps.plan.outputs.mode == 'fast-forward'
        run: |
          git checkout "${BASE_BRANCH}"
          git merge --ff-only "upstream/${UPSTREAM_BRANCH}"
          git push origin "${BASE_BRANCH}"

      - name: Report no upstream updates
        if: steps.plan.outputs.mode == 'none'
        run: |
          echo "No upstream changes to apply."

      - name: Report customized child repo
        if: steps.plan.outputs.mode == 'skip-customized'
        run: |
          echo "Child repo has custom commits; skipping upstream sync."
