name: Sync upstream intelligently

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

env:
  UPSTREAM_REPO: your-org/your-upstream-repo
  UPSTREAM_BRANCH: main
  BASE_BRANCH: main
  SYNC_BRANCH: upstream-sync-main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout child repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote remove upstream || true
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch --no-tags upstream "${UPSTREAM_BRANCH}"
          git fetch --no-tags origin "${BASE_BRANCH}"

      - name: Decide what to do
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          COUNTS=$(git rev-list --left-right --count "${BASE_BRANCH}...upstream/${UPSTREAM_BRANCH}")
          AHEAD=$(echo "$COUNTS" | awk '{print $1}')
          BEHIND=$(echo "$COUNTS" | awk '{print $2}')

          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"

          if [ "$BEHIND" -eq 0 ]; then
            echo "mode=none" >> "$GITHUB_OUTPUT"
          elif [ "$AHEAD" -eq 0 ]; then
            echo "mode=fast-forward" >> "$GITHUB_OUTPUT"
          else
            echo "mode=pull-request" >> "$GITHUB_OUTPUT"
          fi

      - name: Fast-forward main
        if: steps.plan.outputs.mode == 'fast-forward'
        run: |
          git checkout "${BASE_BRANCH}"
          git merge --ff-only "upstream/${UPSTREAM_BRANCH}"
          git push origin "${BASE_BRANCH}"

      - name: Refresh PR branch from upstream
        if: steps.plan.outputs.mode == 'pull-request'
        run: |
          git checkout -B "${SYNC_BRANCH}" "upstream/${UPSTREAM_BRANCH}"
          git push --force-with-lease origin "${SYNC_BRANCH}"

      - name: Create or update PR
        if: steps.plan.outputs.mode == 'pull-request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list \
            --base "${BASE_BRANCH}" \
            --head "${SYNC_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --base "${BASE_BRANCH}" \
              --head "${SYNC_BRANCH}" \
              --title "Sync upstream changes from ${UPSTREAM_REPO}" \
              --body "This PR was created automatically because upstream has new commits and this child repo has custom commits on ${BASE_BRANCH}.

          Upstream branch: \`${UPSTREAM_BRANCH}\`
          Child branch: \`${BASE_BRANCH}\`

          If this PR merges cleanly, it will bring the latest upstream version into this repo. If GitHub shows conflicts, they need to be resolved before merging."
          else
            gh pr comment "$EXISTING_PR" --body "Upstream changed again, so this sync branch was refreshed automatically."
          fi

      - name: Nothing to do
        if: steps.plan.outputs.mode == 'none'
        run: echo "Upstream is not ahead of ${BASE_BRANCH}; nothing to sync."
